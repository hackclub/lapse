appId: com.hackclub.lapse
productName: Lapse
directories:
  output: release
  buildResources: build

files:
  - "out/**/*"

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]

linux:
  icon: build/icon.png
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  differentialPackage: true

publish:
  provider: github
  owner: hackclub
  repo: lapse
